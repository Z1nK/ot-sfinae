name: 'C++ CI print_ip'

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtest-dev

      - name: Configure
        run: cmake . -DPATCH_VERSION=${{ github.run_number }}

      - name: Build
        run: cmake --build .

      - name: Create package
        run: cmake --build . --target package

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: print_ip-0.0.${{ github.run_number }}-Linux.deb
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Create GitHub Release and upload asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.run_number }} \
            --repo ${{ github.repository }} \
            --title "Release ${{ github.run_number }}" \
            --notes "Automated release ${{ github.run_number }}" \
            ./print_ip-0.0.${{ github.run_number }}-Linux.deb
